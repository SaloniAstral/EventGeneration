AWSTemplateFormatVersion: '2010-09-09'
Description: 'Financial Data Streaming System - ECS Services'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
    Description: Environment name
  
  ECSClusterName:
    Type: String
    Description: Name of the ECS Cluster
  
  ApplicationLoadBalancerArn:
    Type: String
    Description: ARN of the Application Load Balancer
  
  ECSTaskExecutionRoleArn:
    Type: String
    Description: ARN of the ECS Task Execution Role
  
  ECSTaskRoleArn:
    Type: String
    Description: ARN of the ECS Task Role
  
  ECRRepositoryAPIServerURI:
    Type: String
    Description: URI of the API Server ECR Repository
  
  ECRRepositoryStreamReceiverURI:
    Type: String
    Description: URI of the Stream Receiver ECR Repository
  
  ECRRepositoryDriverURI:
    Type: String
    Description: URI of the Driver ECR Repository
  
  ECRRepositoryMonitoringURI:
    Type: String
    Description: URI of the Monitoring ECR Repository
  
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for the services
  
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for services
  
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for services
  
  APIServerDesiredCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: Desired number of API Server instances
  
  StreamReceiverDesiredCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: Desired number of Stream Receiver instances
  
  DriverDesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 5
    Description: Desired number of Driver instances
  
  MonitoringDesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 3
    Description: Desired number of Monitoring instances

Resources:
  # API Server Task Definition
  APIServerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'financial-streaming-api-server-${Environment}'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn: !Ref ECSTaskExecutionRoleArn
      TaskRoleArn: !Ref ECSTaskRoleArn
      ContainerDefinitions:
        - Name: api-server
          Image: !Sub '${ECRRepositoryAPIServerURI}:latest'
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: LOG_LEVEL
              Value: INFO
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub '/ecs/financial-streaming-${Environment}'
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api-server
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          Essential: true

  # Stream Receiver Task Definition
  StreamReceiverTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'financial-streaming-stream-receiver-${Environment}'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn: !Ref ECSTaskExecutionRoleArn
      TaskRoleArn: !Ref ECSTaskRoleArn
      ContainerDefinitions:
        - Name: stream-receiver
          Image: !Sub '${ECRRepositoryStreamReceiverURI}:latest'
          PortMappings:
            - ContainerPort: 8002
              Protocol: tcp
          Environment:
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: LOG_LEVEL
              Value: INFO
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub '/ecs/financial-streaming-${Environment}'
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: stream-receiver
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8002/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          Essential: true

  # Driver Task Definition
  DriverTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'financial-streaming-driver-${Environment}'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !Ref ECSTaskExecutionRoleArn
      TaskRoleArn: !Ref ECSTaskRoleArn
      ContainerDefinitions:
        - Name: driver
          Image: !Sub '${ECRRepositoryDriverURI}:latest'
          PortMappings:
            - ContainerPort: 8001
              Protocol: tcp
          Environment:
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: LOG_LEVEL
              Value: INFO
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub '/ecs/financial-streaming-${Environment}'
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: driver
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8001/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          Essential: true

  # Monitoring Task Definition
  MonitoringTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub 'financial-streaming-monitoring-${Environment}'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !Ref ECSTaskExecutionRoleArn
      TaskRoleArn: !Ref ECSTaskRoleArn
      ContainerDefinitions:
        - Name: monitoring
          Image: !Sub '${ECRRepositoryMonitoringURI}:latest'
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: ENVIRONMENT
              Value: !Ref Environment
            - Name: LOG_LEVEL
              Value: INFO
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub '/ecs/financial-streaming-${Environment}'
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: monitoring
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8080/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          Essential: true

  # API Server Service
  APIServerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub 'financial-streaming-api-server-${Environment}'
      Cluster: !Ref ECSClusterName
      TaskDefinition: !Ref APIServerTaskDefinition
      DesiredCount: !Ref APIServerDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref ECSServiceSecurityGroup
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
      LoadBalancers:
        - ContainerName: api-server
          ContainerPort: 8000
          TargetGroupArn: !Ref APIServerTargetGroup
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: api-server

  # Stream Receiver Service
  StreamReceiverService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub 'financial-streaming-stream-receiver-${Environment}'
      Cluster: !Ref ECSClusterName
      TaskDefinition: !Ref StreamReceiverTaskDefinition
      DesiredCount: !Ref StreamReceiverDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref ECSServiceSecurityGroup
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
      LoadBalancers:
        - ContainerName: stream-receiver
          ContainerPort: 8002
          TargetGroupArn: !Ref StreamReceiverTargetGroup
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: stream-receiver

  # Driver Service
  DriverService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub 'financial-streaming-driver-${Environment}'
      Cluster: !Ref ECSClusterName
      TaskDefinition: !Ref DriverTaskDefinition
      DesiredCount: !Ref DriverDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref ECSServiceSecurityGroup
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
      LoadBalancers:
        - ContainerName: driver
          ContainerPort: 8001
          TargetGroupArn: !Ref DriverTargetGroup
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: driver

  # Monitoring Service
  MonitoringService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub 'financial-streaming-monitoring-${Environment}'
      Cluster: !Ref ECSClusterName
      TaskDefinition: !Ref MonitoringTaskDefinition
      DesiredCount: !Ref MonitoringDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref ECSServiceSecurityGroup
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
      LoadBalancers:
        - ContainerName: monitoring
          ContainerPort: 8080
          TargetGroupArn: !Ref MonitoringTargetGroup
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: monitoring

  # ECS Service Security Group
  ECSServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub 'financial-streaming-ecs-service-${Environment}'
      GroupDescription: Security group for ECS services
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8002
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8002
          SourceSecurityGroupId: !Ref ECSServiceSecurityGroup
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ECSServiceSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ALB Security Group (referenced from cluster stack)
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub 'financial-streaming-alb-${Environment}'
      GroupDescription: Security group for ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # API Server Target Group
  APIServerTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'financial-streaming-api-server-tg-${Environment}'
      Port: 8000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: api-server

  # Stream Receiver Target Group
  StreamReceiverTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'financial-streaming-stream-receiver-tg-${Environment}'
      Port: 8002
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: stream-receiver

  # Driver Target Group
  DriverTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'financial-streaming-driver-tg-${Environment}'
      Port: 8001
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: driver

  # Monitoring Target Group
  MonitoringTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'financial-streaming-monitoring-tg-${Environment}'
      Port: 8080
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: monitoring

  # ALB Listeners
  APIServerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancerArn
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref APIServerTargetGroup

  StreamReceiverListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancerArn
      Port: 8002
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref StreamReceiverTargetGroup

  DriverListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancerArn
      Port: 8001
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref DriverTargetGroup

  MonitoringListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancerArn
      Port: 8080
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MonitoringTargetGroup

  # Auto Scaling for API Server
  APIServerAutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 10
      MinCapacity: 1
      ResourceId: !Sub 'service/${ECSClusterName}/${APIServerService.Name}'
      RoleARN: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  APIServerAutoScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub 'financial-streaming-api-server-scaling-${Environment}'
      PolicyType: TargetTrackingScaling
      ScalableTargetId: !Ref APIServerAutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleOutCooldown: 300
        ScaleInCooldown: 300

  # Auto Scaling for Stream Receiver
  StreamReceiverAutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 10
      MinCapacity: 1
      ResourceId: !Sub 'service/${ECSClusterName}/${StreamReceiverService.Name}'
      RoleARN: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  StreamReceiverAutoScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub 'financial-streaming-stream-receiver-scaling-${Environment}'
      PolicyType: TargetTrackingScaling
      ScalableTargetId: !Ref StreamReceiverAutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleOutCooldown: 300
        ScaleInCooldown: 300

Outputs:
  APIServerServiceName:
    Description: Name of the API Server Service
    Value: !Ref APIServerService
    Export:
      Name: !Sub '${AWS::StackName}-APIServerServiceName'

  StreamReceiverServiceName:
    Description: Name of the Stream Receiver Service
    Value: !Ref StreamReceiverService
    Export:
      Name: !Sub '${AWS::StackName}-StreamReceiverServiceName'

  DriverServiceName:
    Description: Name of the Driver Service
    Value: !Ref DriverService
    Export:
      Name: !Sub '${AWS::StackName}-DriverServiceName'

  MonitoringServiceName:
    Description: Name of the Monitoring Service
    Value: !Ref MonitoringService
    Export:
      Name: !Sub '${AWS::StackName}-MonitoringServiceName'

  APIServerTargetGroupArn:
    Description: ARN of the API Server Target Group
    Value: !Ref APIServerTargetGroup
    Export:
      Name: !Sub '${AWS::StackName}-APIServerTargetGroupArn'

  StreamReceiverTargetGroupArn:
    Description: ARN of the Stream Receiver Target Group
    Value: !Ref StreamReceiverTargetGroup
    Export:
      Name: !Sub '${AWS::StackName}-StreamReceiverTargetGroupArn'

  DriverTargetGroupArn:
    Description: ARN of the Driver Target Group
    Value: !Ref DriverTargetGroup
    Export:
      Name: !Sub '${AWS::StackName}-DriverTargetGroupArn'

  MonitoringTargetGroupArn:
    Description: ARN of the Monitoring Target Group
    Value: !Ref MonitoringTargetGroup
    Export:
      Name: !Sub '${AWS::StackName}-MonitoringTargetGroupArn' 